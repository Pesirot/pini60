<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>יום הולדת 60 לפיני! 🎉</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>
    :root { --accent-gold: #d4af37; }
    body { background: linear-gradient(135deg, #5fa8ff, #0f172a); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
    .main-container { max-width: 500px; margin: 0 auto; text-align: center; }
    .father-img { width: 180px; height: 180px; border-radius: 50%; border: 5px solid var(--accent-gold); object-fit: cover; margin-bottom: 20px; }
    .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; backdrop-filter: blur(5px); }
    input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; }
    .btn-row { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
    button { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; background: var(--accent-gold); font-weight: bold; }
    .post { background: #fff; color: #000; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: right; }
    #previewZone { margin: 10px 0; position: relative; display: inline-block; }
</style>
</head>
<body>

<div class="main-container">
    <h1>יום הולדת 60 לפיני 🎉</h1>
    <img src="Father.jpeg" class="father-img" alt="פיני">
    
    <div class="card">
        <input id="userName" placeholder="השם שלך...">
        <textarea id="postText" placeholder="מה תרצו לכתוב?"></textarea>
        
        <div class="btn-row">
            <label style="background:#555; padding:10px; border-radius:10px; cursor:pointer;">📸 תמונה
                <input type="file" id="mediaInput" accept="image/*" style="display:none;" onchange="showPreview()">
            </label>
            <button onclick="document.getElementById('postText').value += '😊'">😊</button>
            <button id="publishBtn" onclick="sendPost()">פרסם ברכה</button>
        </div>
        <div id="previewZone"></div>
    </div>
    <div id="premiumFeed"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA4isUCqHs8Pw3s0H5S6b1KWYQP6jBGpJQ",
        authDomain: "pini60-79902.firebaseapp.com",
        projectId: "pini60-79902",
        storageBucket: "pini60-79902.firebasestorage.app",
        messagingSenderId: "991108071521",
        appId: "1:991108071521:web:838af6deeab71264a5aa20"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    function showPreview() {
        const file = document.getElementById('mediaInput').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('previewZone').innerHTML = `<img src="${e.target.result}" style="width:100px; border-radius:10px;"> <button onclick="this.parentElement.innerHTML=''">X</button>`;
        };
        reader.readAsDataURL(file);
    }

    async function sendPost() {
        const btn = document.getElementById('publishBtn');
        const file = document.getElementById('mediaInput').files[0];
        btn.innerText = "מעלה...";
        
        let url = null;
        if(file) {
            const snapshot = await storage.ref('posts/' + Date.now()).put(file);
            url = await snapshot.ref.getDownloadURL();
        }
        
        await db.collection("posts").add({
            author: document.getElementById('userName').value || 'אורח',
            text: document.getElementById('postText').value,
            mediaUrl: url,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        location.reload();
    }

    db.collection("posts").orderBy("timestamp", "desc").onSnapshot(s => {
        const feed = document.getElementById('premiumFeed');
        feed.innerHTML = '';
        s.forEach(doc => {
            const p = doc.data();
            feed.innerHTML += `<div class="post"><b>${p.author}</b><br>${p.text}${p.mediaUrl ? `<br><img src="${p.mediaUrl}" style="width:100%; margin-top:10px;">` : ''}</div>`;
        });
    });
</script>
</body>
</html>
