<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>יום הולדת 60 לפיני</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
</head>
<body style="background:#0f172a; color:white; text-align:center; font-family:sans-serif; padding:20px;">

    <h1>יום הולדת 60 לפיני 🎉</h1>
    <img src="Father.jpeg" style="width:150px; border-radius:50%; border:4px solid #d4af37;">
    
    <div style="max-width:400px; margin:20px auto; background:rgba(255,255,255,0.1); padding:20px; border-radius:15px;">
        <input id="name" placeholder="שם" style="width:100%; padding:10px; margin-bottom:5px;"><br>
        <textarea id="text" placeholder="ברכה..." style="width:100%; padding:10px;"></textarea><br>
        <input type="file" id="file" accept="image/*"><br>
        <button onclick="document.getElementById('text').value += '😊'">😊</button>
        <button id="send" onclick="upload()" style="background:#d4af37; padding:10px; border:none; cursor:pointer;">פרסם</button>
    </div>

    <div id="feed"></div>

<script>
    const config = {
        apiKey: "AIzaSyA4isUCqHs8Pw3s0H5S6b1KWYQP6jBGpJQ",
        projectId: "pini60-79902",
        storageBucket: "pini60-79902.firebasestorage.app"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const storage = firebase.storage();

    async function upload() {
        const btn = document.getElementById('send');
        btn.innerText = "מעלה...";
        const file = document.getElementById('file').files[0];
        let url = null;

        if (file) {
            const ref = storage.ref('posts/' + Date.now());
            const snap = await ref.put(file);
            url = await snap.ref.getDownloadURL();
        }

        await db.collection("posts").add({
            author: document.getElementById('name').value,
            text: document.getElementById('text').value,
            mediaUrl: url,
            time: Date.now()
        });
        location.reload();
    }

    db.collection("posts").orderBy("time", "desc").onSnapshot(s => {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        s.forEach(d => {
            const p = d.data();
            feed.innerHTML += `<div style="background:white; color:black; padding:10px; margin:10px; border-radius:10px; text-align:right;">
                <b>${p.author}</b><br>${p.text}${p.mediaUrl ? `<br><img src="${p.mediaUrl}" style="width:100px;">` : ''}</div>`;
        });
    });
</script>
</body>
</html>
