<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>יום הולדת 60 לפיני! 🎉</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&amp;family=Secular+One&amp;display=swap" rel="stylesheet"/>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>
    :root { --accent-gold: #d4af37; }
    body { background: linear-gradient(135deg, #5fa8ff, #0f172a); color: #f8fafc; min-height: 100vh; padding: 20px; font-family: 'Assistant', sans-serif; }
    .main-container { max-width: 600px; margin: 0 auto; }
    .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 24px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .father-img { width: 180px; height: 180px; border-radius: 50%; border: 6px solid var(--accent-gold); object-fit: cover; margin-bottom: 20px; }
    
    /* עיצוב אזור תצוגה מקדימה */
    #previewZone { position: relative; display: inline-block; margin-top: 15px; }
    .remove-img-btn { position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; width: 25px; height: 25px; border: none; cursor: pointer; font-weight: bold; }
    
    .custom-upload-btn { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; cursor: pointer; color: white; border: 1px solid rgba(255,255,255,0.2); }
    .premium-publish-btn { background: var(--accent-gold); color: #0f172a; border: none; padding: 10px 40px; border-radius: 30px; font-weight: 800; cursor: pointer; }
    .premium-post { background: white; color: #1e293b; border-radius: 20px; padding: 20px; margin-top: 20px; border-right: 5px solid var(--accent-gold); }
</style>
</head>
<body>
<div style="text-align: center;">
    <h1>יום הולדת 60 לפיני 🎉</h1>
    <img src="Father.jpeg" class="father-img" alt="פיני">
</div>

<div class="main-container">
    <div class="glass-card">
        <input id="userName" placeholder="השם שלך..." type="text" style="width:100%; padding:10px; border-radius:10px; border:none; margin-bottom:10px;"/>
        <textarea id="postText" placeholder="מה תרצו לכתוב לפיני?" style="width:100%; padding:10px; border-radius:10px; border:none;"></textarea>
        
        <div style="margin-top: 15px;">
            <label for="mediaInput" class="custom-upload-btn">📸 צרף תמונה</label>
            <input accept="image/*" id="mediaInput" onchange="handleFileSelection()" type="file"/>
        </div>
        
        <div id="previewZone" style="display:none;"></div>
        
        <div style="margin-top: 15px;">
            <button id="publishBtn" class="premium-publish-btn">פרסם</button>
        </div>
    </div>
    <div id="premiumFeed"></div>
</div>

<script>
    const firebaseConfig = { /* ... */ }; // השאירי את שלך כאן
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    function handleFileSelection() {
        const input = document.getElementById('mediaInput');
        const zone = document.getElementById('previewZone');
        if (input.files && input.files[0]) {
            const url = URL.createObjectURL(input.files[0]);
            zone.innerHTML = `<img src="${url}" style="max-height:150px; border-radius:10px;">
                              <button class="remove-img-btn" onclick="removeImage()">X</button>`;
            zone.style.display = 'block';
        }
    }

    function removeImage() {
        document.getElementById('mediaInput').value = '';
        document.getElementById('previewZone').style.display = 'none';
    }

    document.getElementById('publishBtn').onclick = async () => {
        const btn = document.getElementById('publishBtn');
        const text = document.getElementById('postText').value;
        const name = document.getElementById('userName').value || 'אורח';
        const file = document.getElementById('mediaInput').files[0];
        
        btn.innerText = "מעלה תמונה..."; // חיווי למשתמש
        btn.disabled = true;

        try {
            let url = null;
            if (file) {
                const snapshot = await storage.ref(`posts/${Date.now()}`).put(file);
                url = await snapshot.ref.getDownloadURL();
            }
            await db.collection("posts").add({ author: name, text: text, mediaUrl: url, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            alert("פורסם בהצלחה!");
            location.reload();
        } catch (e) {
            alert("שגיאה בהעלאה: " + e.message);
            btn.innerText = "פרסם";
            btn.disabled = false;
        }
    };

    // Load posts... (נשאר זהה)
</script>
</body>
</html>
