<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>יום הולדת 60 לפיני! 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&family=Secular+One&display=swap" rel="stylesheet"/>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
    :root { --accent-gold: #d4af37; --bg-dark: #0f172a; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Assistant', sans-serif; }
    body { background: linear-gradient(135deg, #5fa8ff, #0f172a); color: #f8fafc; min-height: 100vh; padding-bottom: 60px; }
    .premium-header { text-align: center; padding: 40px 20px; }
    .premium-header h1 { font-family: 'Secular One', sans-serif; font-size: 3rem; color: var(--accent-gold); text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .father-img { width: 200px; height: 200px; border-radius: 50%; border: 6px solid var(--accent-gold); object-fit: cover; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .main-container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
    .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 24px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); margin-top: 20px; }
    input, textarea { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 15px; color: white; margin-bottom: 15px; font-size: 16px; }
    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; }
    .emoji-btn { background: none; border: none; font-size: 24px; cursor: pointer; transition: transform 0.2s; }
    .emoji-btn:hover { transform: scale(1.3); }
    .publish-btn { background: var(--accent-gold); color: var(--bg-dark); border: none; padding: 12px; border-radius: 30px; font-weight: 800; cursor: pointer; width: 100%; font-size: 18px; }
    .post { background: white; color: #1e293b; padding: 20px; border-radius: 20px; margin-top: 20px; border-right: 5px solid var(--accent-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<div class="premium-header">
    <h1>יום הולדת 60 לפיני 🎉</h1>
    <img src="Father.jpeg" class="father-img" alt="פיני">
</div>

<div class="main-container">
    <div class="glass-card">
        <input id="userName" placeholder="השם שלך..." type="text"/>
        <div class="emoji-grid" id="emojiGrid"></div>
        <textarea id="postText" placeholder="כתבו כאן ברכה חמה לפיני..."></textarea>
        <button id="publishBtn" class="publish-btn" onclick="savePost()">פרסם ברכה</button>
    </div>
    <div id="premiumFeed"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA4isUCqHs8Pw3s0H5S6b1KWYQP6jBGpJQ",
        projectId: "pini60-79902",
        firestore: true
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const emojis = ['😊', '😂', '😍', '🥰', '😎', '🥳', '🤩', '🎂', '🎉', '🎊', '🎈', '🎁', '🥂', '🍻', '❤️', '🧡', '💛', '💚', '💙', '💜', '🌟', '✨', '🔥', '👑', '💪', '🙏', '🙌', '✈️', '⚽', '🎸', '🎹', '📸'];
    const grid = document.getElementById('emojiGrid');
    emojis.forEach(e => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn';
        btn.innerText = e;
        btn.onclick = () => document.getElementById('postText').value += e;
        grid.appendChild(btn);
    });

    async function savePost() {
        const name = document.getElementById('userName').value;
        const text = document.getElementById('postText').value;
        if(!text) return alert("נא לכתוב ברכה!");
        
        await db.collection("posts").add({
            author: name || 'אורח',
            text: text,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('postText').value = '';
        alert("הברכה פורסמה בהצלחה!");
    }

    db.collection("posts").orderBy("timestamp", "desc").onSnapshot(s => {
        const feed = document.getElementById('premiumFeed');
        feed.innerHTML = '';
        s.forEach(doc => {
            const p = doc.data();
            feed.innerHTML += `<div class="post"><b>${p.author}</b><br>${p.text}</div>`;
        });
    });
</script>
</body>
</html>
