<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>יום הולדת 60 לפיני! 🎉</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&amp;family=Secular+One&amp;display=swap" rel="stylesheet"/>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>
    :root { --accent-gold: #d4af37; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Assistant', sans-serif; }
    body { background: linear-gradient(135deg, #5fa8ff, #0f172a); color: #f8fafc; min-height: 100vh; padding-bottom: 60px; }
    .premium-header { text-align: center; padding: 40px 20px; }
    .premium-header h1 { font-family: 'Secular One', sans-serif; font-size: 3rem; color: var(--accent-gold); margin-bottom: 20px; }
    
    /* תמונה */
    .father-img { width: 200px; height: 200px; border-radius: 50%; border: 6px solid var(--accent-gold); object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .main-container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
    .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 24px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); margin-bottom: 30px; }
    
    textarea, input[type="text"] { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; color: white; margin-bottom: 15px; font-size: 16px; }
    
    /* עיצוב כפתור העלאה מעוצב אישית */
    .custom-upload-btn { background: rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 30px; cursor: pointer; color: white; display: inline-block; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
    .custom-upload-btn:hover { background: rgba(255,255,255,0.2); }
    #mediaInput { display: none; }
    
    .premium-publish-btn { background: var(--accent-gold); color: #0f172a; border: none; padding: 12px 40px; border-radius: 30px; font-weight: 800; cursor: pointer; font-size: 16px; }
    .premium-post { background: white; color: #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 20px; border-right: 5px solid var(--accent-gold); }
</style>
</head>
<body>
<div class="premium-header">
    <h1>יום הולדת 60 לפיני 🎉</h1>
    <img src="Father.jpeg" class="father-img" alt="פיני">
</div>
<div class="main-container">
    <div class="glass-card">
        <input id="userName" placeholder="השם שלך..." type="text"/>
        <textarea id="postText" placeholder="מה תרצו לכתוב לפיני?"></textarea>
        
        <div style="display: flex; gap: 15px; align-items: center; justify-content: space-between;">
            <!-- כפתור העלאה מוסתר שהופעל ע"י הלייבל -->
            <label for="mediaInput" class="custom-upload-btn">📸 צרף תמונה/וידאו</label>
            <input accept="image/*,video/*" id="mediaInput" onchange="handleFileSelection()" type="file"/>
            
            <button id="publishBtn" class="premium-publish-btn">פרסם</button>
        </div>
        <div id="previewZone" style="margin-top:15px; display:none;"></div>
    </div>
    <div id="premiumFeed"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA4isUCqHs8Pw3s0H5S6b1KWYQP6jBGpJQ",
        authDomain: "pini60-79902.firebaseapp.com",
        projectId: "pini60-79902",
        storageBucket: "pini60-79902.firebasestorage.app",
        messagingSenderId: "991108071521",
        appId: "1:991108071521:web:838af6deeab71264a5aa20"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    function handleFileSelection() {
        const input = document.getElementById('mediaInput');
        if (input.files && input.files[0]) {
            const url = URL.createObjectURL(input.files[0]);
            document.getElementById('previewZone').innerHTML = `<img src="${url}" style="max-height:100px; border-radius:10px;">`;
            document.getElementById('previewZone').style.display = 'block';
        }
    }

    document.getElementById('publishBtn').onclick = () => {
        const text = document.getElementById('postText').value;
        const name = document.getElementById('userName').value || 'אורח';
        const file = document.getElementById('mediaInput').files[0];
        
        if (file) {
            storage.ref(`posts/${Date.now()}`).put(file).then(s => s.ref.getDownloadURL()).then(url => save(name, text, url));
        } else { save(name, text, null); }
    };

    function save(name, text, url) {
        db.collection("posts").add({ author: name, text: text, mediaUrl: url, timestamp: firebase.firestore.FieldValue.serverTimestamp() })
          .then(() => { alert("פורסם!"); location.reload(); });
    }

    db.collection("posts").orderBy("timestamp", "desc").onSnapshot(s => {
        const feed = document.getElementById('premiumFeed');
        feed.innerHTML = '';
        s.forEach(doc => {
            const p = doc.data();
            feed.innerHTML += `<div class="premium-post"><strong>${p.author}</strong><br>${p.text}${p.mediaUrl ? `<br><img src="${p.mediaUrl}" style="width:100%; margin-top:10px; border-radius:10px;">` : ''}</div>`;
        });
    });
</script>
</body>
</html>
