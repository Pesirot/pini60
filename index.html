<!DOCTYPE html>

<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>יום הולדת 60 לפיני! 🎉</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&amp;family=Secular+One&amp;display=swap" rel="stylesheet"/>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js"></script>

<style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(255, 255, 255, 0.92);
            --accent-gold: #d4af37;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Assistant', sans-serif;
        }
        
        body {
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 60px;
            background-attachment: fixed;
        }
        
        .premium-header {
            text-align: center;
            padding: 50px 20px 30px 20px;
        }
        
        .premium-header h1 {
            font-family: 'Secular One', sans-serif;
            font-size: 3.5rem;
            color: var(--accent-gold);
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        
        .premium-header p {
            font-size: 1.3rem;
            color: #94a3b8;
            font-weight: 300;
        }
        
        .main-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }
        
        .card-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .icon-avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent-gold), #b8962e);
            color: #0f172a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .card-title-area span {
            font-weight: 600;
            color: #f1f5f9;
            font-size: 1.1rem;
        }
        
        .glass-card textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 14px;
            font-size: 17px;
            color: white;
            outline: none;
            resize: none;
            min-height: 80px;
        }
        
        .glass-card textarea::placeholder {
            color: #94a3b8;
        }
        
        .media-preview-zone {
            margin: 15px 0 5px 0;
            display: none;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.3);
            background: #000;
        }
        
        .media-preview-zone img,
        .media-preview-zone video {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            display: block;
        }
        
        .cancel-file-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-actions {
            margin-top: 15px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 8px;
        }
        
        .upload-label-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            color: #e2e8f0;
        }
        
        .upload-label-btn input[type="file"] {
            display: none;
        }
        
        .premium-publish-btn {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b8962e 100%);
            color: #0f172a;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(212,175,55,0.3);
            transition: transform 0.2s;
        }
        
        .premium-publish-btn:hover {
            transform: scale(1.05);
        }
        
        .premium-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .premium-post {
            background: var(--bg-card);
            color: var(--text-main);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            border-right: 5px solid var(--accent-gold);
            animation: fancySlideIn 0.5s ease;
        }
        
        .post-top-bar {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .post-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: var(--accent-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border: 2px solid var(--accent-gold);
        }
        
        .post-info .author {
            font-weight: 700;
            font-size: 16px;
        }
        
        .post-info .time-tag {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .post-body-text {
            padding: 0 20px 16px 20px;
            font-size: 17px;
            line-height: 1.6;
            color: #334155;
            white-space: pre-line;
        }
        
        .post-media-box {
            background: #000;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        
        .post-media-box img,
        .post-media-box video {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            display: block;
        }
        
        @keyframes fancySlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    
body{background:linear-gradient(135deg,#5fa8ff,#0f172a)!important}
.premium-header{padding-bottom:10px}
.glass-card,.premium-post{border-radius:24px}
</style>
</head>
<body>
<div class="premium-header">
<h1>יום הולדת לפיני 60 🎉</h1>
<p>מעלים ברכות, תמונות וחיוכים מכל הלב!</p>
</div><div style="text-align:center;margin:20px auto;">
<img src="use this.jpeg" style="width:180px;height:180px;border-radius:50%;object-fit:cover;border:6px solid #d4af37;box-shadow:0 10px 30px rgba(0,0,0,.35)"/>
<div style="color:white;font-size:22px;margin-top:12px">❤️ פיני שלנו ❤️</div>
</div>
<div class="main-container">
<div class="glass-card">
<div class="card-title-area">
<div class="icon-avatar">🥂</div>
<span>כתבו פוסט וברכו את אבא...</span>
</div>
<input id="userName" maxlength="50" placeholder="הזן את שמך" style="width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; font-size: 16px; margin-bottom: 12px; outline: none;" type="text"/>
<textarea id="postText" placeholder="על מה אתם חושבים? רשמו כאן ברכה חמה..."></textarea>
<div class="media-preview-zone" id="previewZone">
<button class="cancel-file-btn" onclick="removeSelectedFile()">×</button>
<div id="previewOutput"></div>
</div>
<div class="card-actions">
<label class="upload-label-btn">
<span class="icon">📸</span>
<span>תמונה / סרטון</span>
<input accept="image/*,video/*" id="mediaInput" onchange="handleFileSelection()" type="file"/>
</label>
<button id="quickEmojiBtn" onclick="toggleQuickEmojiPopup()" style="background: linear-gradient(135deg, var(--accent-gold) 0%, #b8962e 100%); color: #0f172a; border: none; padding: 10px 14px; border-radius: 30px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 4px 12px rgba(212,175,55,0.3); transition: all 0.2s; position: relative;" title="בחר סמיילי">😊</button>
<div id="quickEmojiPopup" onmouseleave="closeQuickEmojiPopup()" style="display: none; position: absolute; background: rgba(255, 255, 255, 0.95); border-radius: 12px; padding: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 1000; margin-top: 50px; margin-right: -140px; width: 220px; backdrop-filter: blur(12px);">
<div id="quickEmojiGrid" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;"></div>
</div>
<button class="premium-publish-btn" onclick="publishPremiumPost()" style="margin-right: auto;">פרסם</button>
</div>
</div>
<div class="premium-feed" id="premiumFeed">
<div class="premium-post">
<div class="post-top-bar">
<div class="post-avatar">❤️</div>
<div class="post-info">
<div class="author">אורח/ת באירוע</div>
<div class="time-tag">לפני 3 דקות</div>
</div>
</div>
<div class="post-body-text">פיני היקר, מזל טוב ענק לגיל 60! 🥂 מאחלים לך את כל האושר שבעולם, בריאות, נחת, ושתמשיך לחגוג ולטרוף את החיים כמו שאתה יודע! אוהבים המון! 🎉🎈</div>
</div>
</div>
</div>
<script>
        let selectedFileHolder = null;
        let quickEmojiOpen = false;
        const emojis = ['😊', '❤️', '🥰', '🎉', '🎈', '🥂', '🌟', '💪', '👍', '🙏', '😂', '😍', '🎊', '✨', '🔥', '💯', '😎', '🤗', '💝', '🎁', '🍾', '👏', '🌺', '💐'];

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA4isUCqHs8Pw3s0H5S6b1KWYQP6jBGpJQ",
            authDomain: "pini60-79902.firebaseapp.com",
            projectId: "pini60-79902",
            storageBucket: "pini60-79902.firebasestorage.app",
            messagingSenderId: "991108071521",
            appId: "1:991108071521:web:838af6deeab71264a5aa20"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(app);
        const storage = firebase.storage(app);

        function toggleQuickEmojiPopup() {
            quickEmojiOpen = !quickEmojiOpen;
            const popup = document.getElementById('quickEmojiPopup');
            
            if (quickEmojiOpen) {
                popup.style.display = 'block';
            } else {
                popup.style.display = 'none';
            }
        }

        function closeQuickEmojiPopup() {
            quickEmojiOpen = false;
            document.getElementById('quickEmojiPopup').style.display = 'none';
        }

        function initEmojiPicker() {
            // Init quick emoji popup
            const quickGrid = document.getElementById('quickEmojiGrid');
            emojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.textContent = emoji;
                btn.style.fontSize = '20px';
                btn.style.background = 'transparent';
                btn.style.border = 'none';
                btn.style.cursor = 'pointer';
                btn.style.padding = '4px';
                btn.style.transition = 'all 0.2s';
                btn.onmouseover = () => {
                    btn.style.transform = 'scale(1.3)';
                };
                btn.onmouseout = () => {
                    btn.style.transform = 'scale(1)';
                };
                btn.onclick = () => {
                    const textarea = document.getElementById('postText');
                    textarea.value += emoji;
                    textarea.focus();
                    closeQuickEmojiPopup();
                };
                quickGrid.appendChild(btn);
            });
        }

        function handleFileSelection() {
            const fileInput = document.getElementById('mediaInput');
            const previewZone = document.getElementById('previewZone');
            const previewOutput = document.getElementById('previewOutput');

            if (fileInput.files && fileInput.files[0]) {
                selectedFileHolder = fileInput.files[0];
                const fileUrl = URL.createObjectURL(selectedFileHolder);
                previewOutput.innerHTML = '';

                if (selectedFileHolder.type.startsWith('image/')) {
                    previewOutput.innerHTML = `<img src="${fileUrl}">`;
                } else if (selectedFileHolder.type.startsWith('video/')) {
                    previewOutput.innerHTML = `<video src="${fileUrl}" controls muted autoplay loop></video>`;
                }
                previewZone.style.display = 'block';
            }
        }

        function removeSelectedFile() {
            document.getElementById('mediaInput').value = '';
            document.getElementById('previewZone').style.display = 'none';
            document.getElementById('previewOutput').innerHTML = '';
            selectedFileHolder = null;
        }

        function publishPremiumPost() {
            const postText = document.getElementById('postText').value.trim();
            const userName = document.getElementById('userName').value.trim() || 'אורח/ת באירוע';

            if (!postText && !selectedFileHolder) {
                alert("אנא כתבו ברכה או הוסיפו תמונה/וידאו כדי לפרסם.");
                return;
            }

            let mediaUrl = null;

            // If there's a file, upload it first
            if (selectedFileHolder) {
                const storageRef = storage.ref(`posts/${Date.now()}-${selectedFileHolder.name}`);
                storageRef.put(selectedFileHolder).then((snapshot) => {
                    snapshot.ref.getDownloadURL().then((url) => {
                        mediaUrl = url;
                        savePost(userName, postText, mediaUrl);
                    });
                }).catch((error) => {
                    console.error("Upload error:", error);
                    alert("שגיאה בהעלאת התמונה");
                });
            } else {
                savePost(userName, postText, null);
            }

            function savePost(name, text, media) {
                db.collection("posts").add({
                    author: name,
                    text: text,
                    mediaUrl: media,
                    timestamp: new Date(),
                    likes: 0
                }).then(() => {
                    document.getElementById('postText').value = '';
                    removeSelectedFile();
                    loadPosts(); // Reload posts
                }).catch((error) => {
                    console.error("Error adding post:", error);
                    alert("שגיאה בשמירת הפוסט");
                });
            }
        }

        function loadPosts() {
            const premiumFeed = document.getElementById('premiumFeed');

            db.collection("posts").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                premiumFeed.innerHTML = '';
                
                if (snapshot.empty) {
                    premiumFeed.innerHTML = '<div class="premium-post"><div class="post-body-text">אין ברכות עדיין. היו הראשונים! 🎉</div></div>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const post = doc.data();
                    const postElement = document.createElement('div');
                    postElement.className = 'premium-post';

                    const timeOptions = { 
                        year: 'numeric', 
                        month: 'long', 
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    };
                    const postTime = new Date(post.timestamp.toDate()).toLocaleString('he-IL', timeOptions);

                    let mediaHtml = '';
                    if (post.mediaUrl) {
                        if (post.mediaUrl.includes('image')) {
                            mediaHtml = `<div class="post-media-box"><img src="${post.mediaUrl}"></div>`;
                        } else {
                            mediaHtml = `<div class="post-media-box"><video src="${post.mediaUrl}" controls autoplay loop muted></video></div>`;
                        }
                    }

                    postElement.innerHTML = `
                        <div class="post-top-bar">
                            <div class="post-avatar">✨</div>
                            <div class="post-info">
                                <div class="author">${post.author}</div>
                                <div class="time-tag">${postTime}</div>
                            </div>
                        </div>
                        ${post.text ? `<div class="post-body-text">${post.text}</div>` : ''}
                        ${mediaHtml}
                    `;

                    premiumFeed.appendChild(postElement);
                });
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            initEmojiPicker();
            loadPosts();
        });
    </script>
</body>
</html>
