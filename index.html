<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
<title>יום הולדת 60 לפיני! 🎉</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
    :root { --accent-gold: #d4af37; }
    body { background: linear-gradient(135deg, #5fa8ff, #0f172a); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
    .main-container { max-width: 500px; margin: 0 auto; text-align: center; }
    .father-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--accent-gold); object-fit: cover; }
    .card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; backdrop-filter: blur(10px); margin-top: 15px; }
    input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: none; margin-bottom: 10px; box-sizing: border-box; }
    .action-row { display: flex; align-items: center; gap: 10px; }
    
    /* כפתור אימוג'י נקי ללא כיתוב */
    .emoji-trigger { background: none; border: none; font-size: 32px; cursor: pointer; padding: 0; }
    
    .send-btn { background: var(--accent-gold); color: black; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; flex-grow: 1; }
    
    /* חלון קופץ למובייל */
    #emojiPopup { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; color: #000; padding: 20px; border-radius: 20px 20px 0 0; z-index: 999; height: 350px; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); overflow-y: auto; }
    .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
    .emoji-item { font-size: 32px; border: none; background: none; cursor: pointer; }
    .close-btn { width: 100%; padding: 15px; background: #eee; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold; }
    
    .post { background: white; color: #1e293b; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: right; }
</style>
</head>
<body>

<div class="main-container">
    <h1>יום הולדת 60 לפיני 🎉</h1>
    <img src="Father.jpeg" class="father-img" alt="פיני">
    
    <div class="card">
        <input id="userName" placeholder="השם שלך...">
        <textarea id="postText" placeholder="כתבו ברכה..."></textarea>
        <div class="action-row">
            <!-- כפתור אימוג'י נקי בלבד -->
            <button class="emoji-trigger" onclick="document.getElementById('emojiPopup').style.display='block'">😊</button>
            <button class="send-btn" onclick="savePost()">פרסם</button>
        </div>
    </div>
    <div id="premiumFeed"></div>
</div>

<div id="emojiPopup">
    <div class="emoji-grid" id="emojiGrid"></div>
    <button class="close-btn" onclick="document.getElementById('emojiPopup').style.display='none'">סגור</button>
</div>

<script>
    firebase.initializeApp({apiKey: "AIzaSyA4isUCqHs8Pw3s0H5S6b1KWYQP6jBGpJQ", projectId: "pini60-79902", firestore: true});
    const db = firebase.firestore();

    const emojis = ['😊', '😂', '😍', '🥳', '🎂', '🎉', '🎈', '🎁', '🥂', '❤️', '🌟', '👑', '💪', '🙏', '🙌', '⚽', '🎸', '🎹', '📸', '⚡', '🔥', '🥰', '😎', '🤩'];
    const grid = document.getElementById('emojiGrid');
    emojis.forEach(e => {
        const b = document.createElement('button');
        b.className = 'emoji-item'; b.innerText = e;
        b.onclick = () => { document.getElementById('postText').value += e; };
        grid.appendChild(b);
    });

    async function savePost() {
        const text = document.getElementById('postText').value;
        if(!text) return alert("נא לכתוב ברכה");
        await db.collection("posts").add({ author: document.getElementById('userName').value || 'אורח', text, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('postText').value = '';
    }

    db.collection("posts").orderBy("timestamp", "desc").onSnapshot(s => {
        const feed = document.getElementById('premiumFeed');
        feed.innerHTML = '';
        s.forEach(d => {
            const p = d.data();
            feed.innerHTML += `<div class="post"><b>${p.author}</b><br>${p.text}</div>`;
        });
    });
</script>
</body>
</html>
