<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>יום הולדת 60 לפיני! 🎉</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&amp;family=Secular+One&amp;display=swap" rel="stylesheet"/>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(255, 255, 255, 0.92);
            --accent-gold: #d4af37;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Assistant', sans-serif; }
        body { background: linear-gradient(135deg, #5fa8ff, #0f172a); color: #f8fafc; min-height: 100vh; padding-bottom: 60px; background-attachment: fixed; }
        .premium-header { text-align: center; padding: 50px 20px 20px 20px; }
        .premium-header h1 { font-family: 'Secular One', sans-serif; font-size: 3.5rem; color: var(--accent-gold); text-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 10px; }
        .main-container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; padding: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); margin-bottom: 30px; }
        .card-title-area { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .icon-avatar { width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent-gold), #b8962e); color: #0f172a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .glass-card textarea { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 14px; font-size: 17px; color: white; outline: none; resize: none; min-height: 80px; }
        .media-preview-zone { margin: 15px 0 5px 0; display: none; position: relative; border-radius: 10px; overflow: hidden; border: 1px solid rgba(212,175,55,0.3); background: #000; }
        .media-preview-zone img, .media-preview-zone video { width: 100%; max-height: 250px; object-fit: contain; display: block; }
        .cancel-file-btn { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.75); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
        .card-actions { margin-top: 15px; display: flex; align-items: center; gap: 8px; }
        .upload-label-btn { padding: 10px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; cursor: pointer; color: #e2e8f0; }
        .premium-publish-btn { background: linear-gradient(135deg, var(--accent-gold) 0%, #b8962e 100%); color: #0f172a; border: none; padding: 10px 28px; border-radius: 30px; font-weight: 800; cursor: pointer; margin-right: auto; }
        .premium-post { background: var(--bg-card); color: var(--text-main); border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-right: 5px solid var(--accent-gold); margin-bottom: 20px; padding: 16px; }
        .post-top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .post-avatar { width: 44px; height: 44px; background: #1e293b; color: var(--accent-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--accent-gold); }
        .post-body-text { font-size: 17px; line-height: 1.6; color: #334155; white-space: pre-line; }
        .emoji-popup { display: none; position: fixed; background: rgba(255, 255, 255, 0.95); border-radius: 12px; padding: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 2000; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .emoji-grid button { font-size: 20px; background: transparent; border: none; cursor: pointer; padding: 4px; }
</style>
</head>
<body>
<div class="premium-header">
    <h1>יום הולדת לפיני 60 🎉</h1>
    <p>מעלים ברכות, תמונות וחיוכים מכל הלב!</p>
    <!-- תמונת אבא -->
    <div style="text-align:center; margin-top: 20px;">
        <img src="father.jpg" alt="פיני" style="width:180px; height:180px; border-radius:50%; object-fit:cover; border:6px solid #d4af37; box-shadow:0 10px 30px rgba(0,0,0,.35);">
    </div>
</div>
<div class="main-container">
<div class="glass-card">
<div class="card-title-area"><div class="icon-avatar">🥂</div><span>כתבו פוסט וברכו את אבא...</span></div>
<input id="userName" maxlength="50" placeholder="הזן את שמך" style="width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; margin-bottom: 12px; outline: none;" type="text"/>
<textarea id="postText" placeholder="על מה אתם חושבים? רשמו כאן ברכה חמה..."></textarea>
<div class="media-preview-zone" id="previewZone"><button class="cancel-file-btn" onclick="removeSelectedFile()">×</button><div id="previewOutput"></div></div>
<div class="card-actions">
<label class="upload-label-btn">📸 תמונה / סרטון <input accept="image/*,video/*" id="mediaInput" onchange="handleFileSelection()" type="file"/></label>
<button id="quickEmojiBtn" class="upload-label-btn" type="button">😊</button>
<div id="quickEmojiPopup" class="emoji-popup"><div id="quickEmojiGrid" class="emoji-grid"></div></div>
<button id="publishBtn" class="premium-publish-btn" type="button">פרסם</button>
</div>
</div>
<div class="premium-feed" id="premiumFeed"></div>
</div>

<script>
    let selectedFileHolder = null;
    const emojis = ['😊', '❤️', '🥰', '🎉', '🎈', '🥂', '🌟', '💪', '👍', '🙏', '😂', '😍'];

    const firebaseConfig = {
        apiKey: "AIzaSyA4isUCqHs8Pw3s0H5S6b1KWYQP6jBGpJQ",
        authDomain: "pini60-79902.firebaseapp.com",
        projectId: "pini60-79902",
        storageBucket: "pini60-79902.firebasestorage.app",
        messagingSenderId: "991108071521",
        appId: "1:991108071521:web:838af6deeab71264a5aa20"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    function handleFileSelection() {
        const fileInput = document.getElementById('mediaInput');
        const previewZone = document.getElementById('previewZone');
        const previewOutput = document.getElementById('previewOutput');
        if (fileInput.files && fileInput.files[0]) {
            selectedFileHolder = fileInput.files[0];
            const fileUrl = URL.createObjectURL(selectedFileHolder);
            previewOutput.innerHTML = selectedFileHolder.type.startsWith('image/') ? `<img src="${fileUrl}">` : `<video src="${fileUrl}" controls></video>`;
            previewZone.style.display = 'block';
        }
    }

    function removeSelectedFile() {
        document.getElementById('mediaInput').value = '';
        document.getElementById('previewZone').style.display = 'none';
        selectedFileHolder = null;
    }

    function publishPremiumPost() {
        const postText = document.getElementById('postText').value.trim();
        const userName = document.getElementById('userName').value.trim() || 'אורח';
        if (!postText && !selectedFileHolder) return alert("אנא כתבו ברכה או צרפו קובץ.");

        if (selectedFileHolder) {
            const storageRef = storage.ref(`posts/${Date.now()}-${selectedFileHolder.name}`);
            storageRef.put(selectedFileHolder).then(snapshot => snapshot.ref.getDownloadURL()).then(url => savePost(userName, postText, url));
        } else {
            savePost(userName, postText, null);
        }
    }

    function savePost(name, text, media) {
        db.collection("posts").add({ author: name, text: text, mediaUrl: media, timestamp: firebase.firestore.FieldValue.serverTimestamp() })
          .then(() => {
              document.getElementById('postText').value = '';
              removeSelectedFile();
              alert("פורסם בהצלחה!");
          });
    }

    function loadPosts() {
        const premiumFeed = document.getElementById('premiumFeed');
        db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            premiumFeed.innerHTML = '';
            snapshot.forEach(doc => {
                const post = doc.data();
                const postDiv = document.createElement('div');
                postDiv.className = 'premium-post';
                postDiv.innerHTML = `
                    <div class="post-top-bar"><div class="post-avatar">✨</div><div><strong>${post.author}</strong></div></div>
                    <div class="post-body-text">${post.text}</div>
                    ${post.mediaUrl ? `<div style="margin-top:10px;"><img src="${post.mediaUrl}" style="width:100%;border-radius:10px;"></div>` : ''}
                `;
                premiumFeed.appendChild(postDiv);
            });
        });
    }

    document.getElementById('publishBtn').addEventListener('click', publishPremiumPost);
    document.getElementById('quickEmojiBtn').addEventListener('click', () => {
        const popup = document.getElementById('quickEmojiPopup');
        popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
    });

    const grid = document.getElementById('quickEmojiGrid');
    emojis.forEach(em => {
        const btn = document.createElement('button');
        btn.textContent = em;
        btn.onclick = () => { document.getElementById('postText').value += em; };
        grid.appendChild(btn);
    });

    loadPosts();
</script>
</body>
</html>
